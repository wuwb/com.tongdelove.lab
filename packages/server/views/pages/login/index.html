{% extends "layouts/pc-default/index.html" %}

{% block header %}
<header class="intro-header" style="background-image: url('public/images/about-bg.jpg')">

</header>
{% endblock %}

{% block body %}
<div class="container">
    <div class="row">
        <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
            <div class="page-heading">
                <h1>登录</h1>
                <hr class="small">
                <div>
                    <form action="/user/login" method="POST">
                        <input type="hidden" name="_csrf" value="{{csrf}}">
                        <div class="form-group">
                            <div>
                                <label for="email">邮箱</label>
                            </div>
                            <div>
                                <input class="form-control" type="text" name="email">
                            </div>
                        </div>
                        <div class="form-group">
                            <div>
                                <label for="password">密码</label>
                            </div>
                            <div>
                                <input class="form-control" type="password" name="password">
                            </div>
                        </div>
                        <div class="form-group">
                            <input type="checkbox"> 记住密码
                            <a href="/user/forget">忘记密码?</a>
                        </div>
                        <div class="form-group">
                            <div>
                            </div>
                            <div>
                                <button class="btn btn-primary" type="submit">登录</button>
                            </div>
                        </div>
                    </form>
                    <div>
                        <h3>其他账号联合登录</h3>
                        <div class="btn-group" role="group" aria-label="Basic example">
                            <a class="btn btn-secondary" href="/user/auth/facebook">Facebook</a>
                            <a class="btn btn-secondary" href="/user/auth/twitter">Twitter</a>
                            <a class="btn btn-secondary" href="/user/auth/google">Google</a>
                            <a class="btn btn-secondary" href="/user/auth/provider">OAuth Provider</a>
                        </div>
                    </div>
                    <div>
                        <h3>还没有账号？</h3>
                        <a class="btn btn-light" href="/user/register">注册</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
