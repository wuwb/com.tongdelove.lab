<script>
    hljs.initHighlightingOnLoad();
    //获取example信息
    $.get('/example/example/EXAMPLE_MAP.txt', function (data) {

        var fileList = {}
        data.split(/[\r\n]/gm).forEach(function (file) {
            var match = file.match(/^([^:]+).+?<title>([\s\S]+?)<\/title>/)
            if (!match) return;
            if (!fileList[RegExp.$1]) fileList[RegExp.$1] = RegExp.$2
        })

        var li = ''
        Object.keys(fileList).forEach(function (key, i) {
            li += '<li><a href="/example/example/' + key + '">' + (i + 1) + '. ' + fileList[key] + '</a></li>'
        })

        $('#demo-list').html(li)
        $('#demo').show()

    })

    jQuery(function () {
        var re = /^(new|changed|fixed|html5|improved|unresolved|developer)[\s]+/
        $('#content li').each(function (index, $li) {
            $li = $($li)
            var match = $.trim($li.text()).match(re)
            if (!match) {
                return
            }
            $li.html($li.html().replace(re, '<span class="history-tag history-tag-$1">$1</span>')).addClass('history')
        })
    })

    //切换版本
    $(function () {
        $('#version').change(function () {
            if (this.options[this.selectedIndex].text.indexOf('latest') > -1) {
                location.href = '/example'
            } else {
                location.href = '/example/+/' + this.value
            }
        })
    })
</script>
