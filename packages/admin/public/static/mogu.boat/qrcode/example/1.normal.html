<script src="../jquery.qrcode-0.8.0.min.js"></script>
<script>
    //jQuery('#qrcode').qrcode("this plugin is great");
    function create() {
        $('#qrcodeDiv').qrcode({
            render: "div",
            text: qrcode.value
        });

        $('#qrcodeCanvas').qrcode({
            render: 'canvas',
            text: qrcode.value,
            size: 400,
            fill: '#00398e',
            background: '#b1fb71'
        });
    }

    $('#qrcode').on('input', function () {
        $('#qrcodeDiv,#qrcodeCanvas').html('')
        create()
    }).trigger('input')

</script>
