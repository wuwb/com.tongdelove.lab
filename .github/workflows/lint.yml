name: Lint

on:
  push:
    branches: [master]
    paths:
      - src/**
  pull_request:
    types: [opened, synchronize]
    paths:
      - src/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: install
        run: npm install

      - name: lint
        run: npm run lint

      - name: prettier
        run: npm run prettier
