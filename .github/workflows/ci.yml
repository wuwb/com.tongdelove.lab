name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps: 
      - name: checkout repo
        uses: actions/checkout@v3

      - name: install pnpm
        uses: pnpm/action-setup@v2.2.4
        id: pnpm-install
        with:
          version: 8
          run_install: false

      - name: get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: setup pnpm cache 
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: setup node 
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: download deps
        run: pnpm install

      - name: copy admin env
        working-directory: ./packages/admin
        run: cp .env.example .env

      - name: copy server env
        working-directory: ./packages/server
        run: cp .env.example .env

      - name: Type check
        working-directory: ./packages/admin
        run: pnpm run lint

      - name: Build
        working-directory: ./packages/admin
        run: pnpm run build

      - name: Type check
        working-directory: ./packages/server
        run: pnpm run lint

      - name: Build
        working-directory: ./packages/server
        run: pnpm run build

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: setup node 
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: npm ci
        working-directory: ./packages/server
        run: npm ci

      - name: npm lint
        working-directory: ./packages/server
        run: npm run lint

  tests:
    needs: linter
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: setup node 
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: npm ci
        working-directory: ./packages/server
        run: npm ci

      - name: npm lint
        working-directory: ./packages/server
        run: npm run test
