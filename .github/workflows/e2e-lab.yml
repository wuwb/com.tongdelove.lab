name: e2e-lab

on:
  push:
    branches: [ "main" ]
    paths:
      - "apps/lab/**"
  pull_request:
    branches: [ "main" ]
   paths:
      - "apps/lab/**"

jobs:
  e2e-lab:
    name: e2e-lab
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:node-18.16.1-chrome-114.0.5735.133-1-ff-114.0.2-edge-114.0.1823.51-1
      options: --user 1001
    defaults:
      run:
        working-directory: ./apps/lab
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Commit Hash
        run: |
          echo "COMMIT_HASH=${{ github.event.pull_request.head.sha || github.sha }}" >> $GITHUB_ENV

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: pnpm/action-setup@v2
        with:
          version: 8.3.1

      - name: Download deps
        run: pnpm install

      - name: Wait for preview deployment
        working-directory: ./apps/lab
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_HASH: ${{ env.COMMIT_HASH }}
        run: node deployment/waitForPreview.js

      - name: Get Deployment URL
        working-directory: ./apps/lab
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_HASH: ${{ env.COMMIT_HASH }}
        run: echo "CYPRESS_BASE_URL=https://$(node deployment/getDeploymentUrl.js)" >> $GITHUB_ENV

      - name: Run Cypress 🌲
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CYPRESS_BASE_URL: ${{ env.CYPRESS_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          CYPRESS_BASE_URL: ${{ env.CYPRESS_BASE_URL }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          VERCEL_LOGIN_TOKEN: ${{ secrets.VERCEL_LOGIN_TOKEN }}
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        with:
          working-directory: ./apps/lab
          install: false
          record: true

