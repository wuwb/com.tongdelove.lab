<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Options Title</title>

    <!-- Customize the manifest options -->
    <meta name="manifest.open_in_tab" content="true" />
    <!-- The chrome_style option cannot be used with manifest version 3. -->
    <!-- <meta name="manifest.chrome_style" content="true" /> -->
    <meta name="manifest.browser_style" content="true" />

    <!-- Set include/exclude if the page should be removed from some builds -->
    <meta name="manifest.include" content="['chrome']" />
    <meta name="manifest.exclude" content="[]" />
  </head>
  <body>
    设置页面
  </body>
</html>
